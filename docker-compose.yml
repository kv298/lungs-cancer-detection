version: '3.8'

services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lung-cancer-detection
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_LOGGER_LEVEL=info
      - TF_CPP_MIN_LOG_LEVEL=3
      - TF_USE_LEGACY_KERAS=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
      - ./datasets:/app/datasets
      - ./images:/app/images
      - ./ctscan_images:/app/ctscan_images
      - ./pynb\ files:/app/pynb\ files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
