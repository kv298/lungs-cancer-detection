[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = false
runOnSave = false
maxUploadSize = 200
maxMessageSize = 200
maintenanceOnStaleElementInteraction = false

[client]
showErrorDetails = false
toolbarMode = "viewer"

[logger]
level = "info"

[browser]
gatherUsageStats = false
serverAddress = "0.0.0.0"
